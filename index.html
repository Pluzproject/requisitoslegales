<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Requisitos Legales - SIG</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        .chart-container { 
            position: relative; 
            height: 240px; 
            width: 100%; 
        }
        
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top; 
        }
        
        th { 
            background-color: #f0f9ff; 
            font-weight: 600; 
            color: #1e3a8a; 
            white-space: nowrap; 
        }
        
        tr:hover { 
            background-color: #eff6ff; 
        }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Matriz de Requisitos Legales</h1>
                <p class="text-blue-300 text-sm mt-1">Sistemas Integrados de Gestión (SIG)</p>
            </div>
            
            <button id="btnReset" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">
                BORRAR FILTROS
            </button>
        </div>
    </header>

    <main class="max-w-[95%] mx-auto px-4 py-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="kpi-container">
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-blue-400">Total Normas</span>
                <div class="text-4xl font-bold mt-2 text-blue-900" id="kpi-total">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-emerald-500">Normas Obligatorias</span>
                <div class="text-4xl font-bold mt-2 text-emerald-700" id="kpi-obligatorias">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-amber-500">Identificadas Ayer</span>
                <div class="text-4xl font-bold mt-2 text-amber-700" id="kpi-ayer">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartYears"></canvas></div>
            </div>
            
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartPillars"></canvas></div>
            </div>
            
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartTypes"></canvas></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
            <div class="p-5 bg-blue-50 border-b flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="Buscar..." class="w-full md:w-80 px-4 py-2 border rounded-lg text-sm">
                
                <select id="filterPilar" class="border rounded-lg text-sm px-3 py-2">
                    <option value="">Todos los Pilares</option>
                </select>
                
                <select id="filterTipo" class="border rounded-lg text-sm px-3 py-2">
                    <option value="">Todos los Tipos</option>
                </select>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-blue-50">
                        <tr>
                            <th class="w-24">Fecha</th>
                            <th class="w-32">Norma</th>
                            <th class="w-24">Pilar</th>
                            <th class="w-64">Sumilla / Descripción</th>
                            <th class="w-32">Autoridad</th>
                            <th class="w-24">Tipo</th>
                            <th class="w-20">Enlace</th>
                            <th class="min-w-[400px]">Recomendación</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Configuración y variables globales
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        let rawData = [];
        let charts = {};

        // Función para decodificar caracteres HTML
        function decodeHtml(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        // Inicialización principal
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('filterPilar').addEventListener('change', applyFilters);
            document.getElementById('filterTipo').addEventListener('change', applyFilters);
            document.getElementById('btnReset').addEventListener('click', resetDashboard);
        });

        // Carga de datos desde CSV
        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data;
                    populateDropdowns(rawData);
                    renderAll(rawData);
                }
            });
        }

        // Población dinámica de filtros
        function populateDropdowns(data) {
            const pilares = [...new Set(data.map(i => i['Pilar del SIG']).filter(Boolean))];
            const tipos = [...new Set(data.map(i => i['Tipo de norma']).filter(Boolean))];
            
            pilares.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                document.getElementById('filterPilar').appendChild(opt);
            });
            
            tipos.forEach(t => {
                let opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                document.getElementById('filterTipo').appendChild(opt);
            });
        }

        // Renderizado general
        function renderAll(data) {
            renderTable(data);
            renderKPIs(data);
            updateCharts(data);
        }

        // Renderizado de tabla detallado
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            [...data].reverse().forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50";
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap">${item['Fecha'] || '-'}</td>
                    <td class="font-bold">${decodeHtml(item['Norma'] || '-')}</td>
                    <td>
                        <span class="px-2 py-1 bg-blue-100 rounded text-xs">${item['Pilar del SIG'] || '-'}</span>
                    </td>
                    <td class="whitespace-normal text-xs">${decodeHtml(item['Sumilla / Descripción'] || '-')}</td>
                    <td class="whitespace-normal text-xs">${decodeHtml(item['Autoridad'] || '-')}</td>
                    <td class="text-xs">${item['Tipo de norma'] || '-'}</td>
                    <td>
                        ${(item['Enlace'] && item['Enlace'] !== '--') ? `<a href="${item['Enlace']}" target="_blank" class="text-blue-600 underline">Ver</a>` : '-'}
                    </td>
                    <td class="whitespace-normal italic font-medium text-gray-700 text-xs">${decodeHtml(item['Recomendación'] || '-')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Cálculo de KPIs
        function renderKPIs(data) {
            const y = new Date();
            y.setDate(y.getDate() - 1);
            const yStr = `${String(y.getDate()).padStart(2,'0')}/${String(y.getMonth()+1).padStart(2,'0')}/${y.getFullYear()}`;
            
            document.getElementById('kpi-total').textContent = data.length;
            document.getElementById('kpi-obligatorias').textContent = data.filter(i => i['Tipo de norma'] === 'Obligatorio').length;
            document.getElementById('kpi-ayer').textContent = data.filter(i => (i['Fecha']||'').trim() === yStr).length;
        }

        // Lógica de filtrado
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const pilar = document.getElementById('filterPilar').value;
            const tipo = document.getElementById('filterTipo').value;
            
            const filtered = rawData.filter(i => {
                const matchSearch = (i['Norma']||'').toLowerCase().includes(search) || (i['Sumilla / Descripción']||'').toLowerCase().includes(search);
                const matchPilar = !pilar || i['Pilar del SIG'] === pilar;
                const matchTipo = !tipo || i['Tipo de norma'] === tipo;
                return matchSearch && matchPilar && matchTipo;
            });
            renderAll(filtered);
        }

        // Reseteo de filtros
        function resetDashboard() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterPilar').value = '';
            document.getElementById('filterTipo').value = '';
            renderAll(rawData);
        }

        // Actualización de gráficos Chart.js
        function updateCharts(data) {
            ['chartYears', 'chartPillars', 'chartTypes'].forEach(id => { if(charts[id]) charts[id].destroy(); });
            
            const counts = (key) => data.reduce((a, i) => { a[i[key]||'N/A'] = (a[i[key]||'N/A']||0)+1; return a; }, {});
            
            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar', 
                data: { labels: Object.keys(counts('Fecha')), datasets: [{ data: Object.values(counts('Fecha')), backgroundColor: '#3b82f6' }] }
            });
            
            charts.chartPillars = new Chart(document.getElementById('chartPillars'), {
                type: 'doughnut', 
                data: { labels: Object.keys(counts('Pilar del SIG')), datasets: [{ data: Object.values(counts('Pilar del SIG')), backgroundColor: ['#3b82f6','#10b981','#f59e0b'] }] }
            });
            
            charts.chartTypes = new Chart(document.getElementById('chartTypes'), {
                type: 'pie', 
                data: { labels: Object.keys(counts('Tipo de norma')), datasets: [{ data: Object.values(counts('Tipo de norma')), backgroundColor: ['#8b5cf6','#ef4444'] }] }
            });
        }
    </script>
</body>
</html>
