<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Requisitos Legales - SGI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        /* =========================================================================
           DEFINICIÓN DE ESTILOS CSS PERSONALIZADOS
           ========================================================================= */
        
        body {
            background-color: #f8fafc;
            color: #1e3a8a;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { 
            padding: 12px; 
            border-bottom: 2px solid #bfdbfe; 
            background-color: #f0f9ff; 
            color: #1e3a8a; 
            font-weight: 700;
            text-align: left;
        }

        td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top;
        }
        
        tr:hover { 
            background-color: #eff6ff; 
            transition: background-color 0.2s ease;
        }

        .main-container {
            max-width: 95%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Espaciadores para organizar la estructura del dashboard */
        .spacer-10 { height: 10px; }
        .spacer-20 { height: 20px; }
        .spacer-50 { height: 50px; }
        
        /* Estilos específicos para los inputs y selects */
        select, input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }
    </style>
</head>

<body class="bg-blue-50">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8 relative">
        <div class="absolute left-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo-SGI-Blanco-1.png" alt="Logo SGI" class="h-10 w-auto opacity-90">
        </div>
        <div class="flex justify-center items-center">
            <h1 class="text-3xl font-bold tracking-tight">Portal de Requisitos Legales</h1>
        </div>
        <div class="absolute right-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo%20versi%C3%B3n%20color%20blanco.png" alt="Logo Pluz" class="h-10 w-auto opacity-90">
        </div>
    </header>

    <main class="main-container">
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-3 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-blue-900 p-6 rounded-xl text-white shadow-lg">
                        <span class="text-xs uppercase opacity-75">Total Normas</span>
                        <div class="text-4xl font-bold mt-2" id="kpi-total">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-red-600">Obligatorias</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-obli">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-blue-600">Informativas</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-info">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-green-600">Referenciales</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-refe">0</div>
                    </div>
                </div>

                <div class="spacer-20"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartYears"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartPillars"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartAuthorities"></canvas></div>
                    </div>
                </div>

                <div class="spacer-20"></div>

                <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table id="dataTable">
                            <thead class="bg-blue-50">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Norma</th>
                                    <th>Pilar</th>
                                    <th>Sumilla / Descripción</th>
                                    <th>Autoridad</th>
                                    <th>Tipo</th>
                                    <th>Enlace</th>
                                    <th>Recomendación</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <aside class="bg-white p-6 rounded-xl border shadow-sm h-fit sticky top-6 space-y-4">
                <h2 class="font-bold text-blue-900 border-b pb-2">Filtros de Búsqueda</h2>
                
                <input type="text" id="searchInput" placeholder="Buscar norma o descripción...">
                
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Fecha Específica</label>
                    <input type="date" id="filterFecha">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Rango de Fecha</label>
                    <input type="date" id="filterFechaDesde" title="Desde">
                    <input type="date" id="filterFechaHasta" title="Hasta">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Periodo (Mes/Año)</label>
                    <select id="filterMesAnio"><option value="">Seleccionar...</option></select>
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Año Específico</label>
                    <select id="filterAnio"><option value="">Todos los Años</option></select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Categorización</label>
                    <select id="filterPilar"><option value="">Todos los Pilares</option></select>
                    <select id="filterTipo"><option value="">Todos los Tipos</option></select>
                </div>
                
                <button id="btnReset" class="w-full bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">RESET FILTROS</button>
            </aside>
        </div>
    </main>

    <script>
        // Configuración Inicial
        Chart.register(ChartDataLabels);
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        
        let rawData = []; // Fuente de verdad de los datos
        let charts = {};  // Almacenamiento de instancias de gráficos

        // 1. CARGA Y PROCESAMIENTO INICIAL
        window.addEventListener('DOMContentLoaded', () => {
            initializeDashboard();
        });

        function initializeDashboard() {
            fetchData();
            setupEventListeners();
        }

        function setupEventListeners() {
            const filters = ['searchInput', 'filterFecha', 'filterFechaDesde', 'filterFechaHasta', 'filterMesAnio', 'filterAnio', 'filterPilar', 'filterTipo'];
            filters.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.addEventListener('change', applyFilters);
                    el.addEventListener('input', applyFilters);
                }
            });
            document.getElementById('btnReset').addEventListener('click', resetDashboard);
        }

        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    processData(results.data);
                }
            });
        }

        function processData(data) {
            rawData = data.filter(r => (r['Norma'] || '').trim().toUpperCase() !== "" && (r['Norma'] || '').trim().toUpperCase() !== "SIN NOVEDAD");
            
            // Procesamiento de fechas para filtrado
            rawData.forEach(row => {
                let f = (row['Fecha'] || '').split('/');
                if(f.length === 3) {
                    row.fEstandar = f[0].padStart(2, '0') + '/' + f[1].padStart(2, '0') + '/' + f[2];
                    row.rawD = f[2] + '-' + f[1] + '-' + f[0];
                    row.mesAnio = f[1].padStart(2, '0') + '/' + f[2];
                    row.a = f[2];
                }
            });
            
            populateFilters();
            renderAll(rawData);
        }

        // 2. MÓDULO DE FILTROS
        function populateFilters() {
            const getUnique = (key) => [...new Set(rawData.map(r => r[key]).filter(v => v))].sort();
            
            fillSelect('filterMesAnio', getUnique('mesAnio'));
            fillSelect('filterAnio', getUnique('a'));
            fillSelect('filterPilar', getUnique('Pilar del SIG'));
            fillSelect('filterTipo', getUnique('Tipo de norma'));
        }

        function fillSelect(id, values) {
            const select = document.getElementById(id);
            values.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const criteria = {
                s: document.getElementById('searchInput').value.toLowerCase(),
                d: document.getElementById('filterFecha').value,
                start: document.getElementById('filterFechaDesde').value,
                end: document.getElementById('filterFechaHasta').value,
                ma: document.getElementById('filterMesAnio').value,
                an: document.getElementById('filterAnio').value,
                pi: document.getElementById('filterPilar').value,
                ti: document.getElementById('filterTipo').value
            };

            const filtered = rawData.filter(item => {
                const matchS = (item['Norma'].toLowerCase().includes(criteria.s) || item['Sumilla / Descripción'].toLowerCase().includes(criteria.s));
                const matchD = (!criteria.d || item.rawD === criteria.d);
                const matchR = (!criteria.start || item.rawD >= criteria.start) && (!criteria.end || item.rawD <= criteria.end);
                const matchMA = (!criteria.ma || item.mesAnio === criteria.ma);
                const matchAN = (!criteria.an || item.a === criteria.an);
                const matchPI = (!criteria.pi || item['Pilar del SIG'] === criteria.pi);
                const matchTI = (!criteria.ti || item['Tipo de norma'] === criteria.ti);
                return matchS && matchD && matchR && matchMA && matchAN && matchPI && matchTI;
            });
            
            renderAll(filtered);
        }

        function resetDashboard() {
            ['searchInput', 'filterFecha', 'filterFechaDesde', 'filterFechaHasta', 'filterMesAnio', 'filterAnio', 'filterPilar', 'filterTipo'].forEach(id => {
                document.getElementById(id).value = '';
            });
            renderAll(rawData);
        }

        // 3. MÓDULO DE RENDERIZADO (TABLA Y KPIs)
        function renderAll(data) {
            renderTable(data);
            updateKPIs(data);
            updateCharts(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            // Ordenar para mostrar lo más reciente primero
            [...data].reverse().forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.fEstandar || '-'}</td>
                    <td class="font-bold">${item['Norma'] || '-'}</td>
                    <td>${item['Pilar del SIG'] || '-'}</td>
                    <td class="text-xs">${item['Sumilla / Descripción'] || '-'}</td>
                    <td class="text-xs">${item['Autoridad'] || '-'}</td>
                    <td class="text-xs">${item['Tipo de norma'] || '-'}</td>
                    <td>${(item['Enlace'] && item['Enlace'] !== '--') ? `<a href="${item['Enlace']}" target="_blank" class="text-blue-600 underline">Ver</a>` : '-'}</td>
                    <td class="text-xs italic">${item['Recomendación'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateKPIs(data) {
            let counters = { obli: 0, info: 0, refe: 0 };
            data.forEach(d => {
                const t = (d['Tipo de norma'] || '').toUpperCase();
                if(t.includes('OBLIGATORIO')) counters.obli++;
                else if(t.includes('INFORMATIVO')) counters.info++;
                else if(t.includes('REFERENCIAL')) counters.refe++;
            });
            
            document.getElementById('kpi-total').textContent = data.length;
            document.getElementById('kpi-obli').textContent = counters.obli;
            document.getElementById('kpi-info').textContent = counters.info;
            document.getElementById('kpi-refe').textContent = counters.refe;
        }

        // 4. MÓDULO DE GRÁFICOS
        function updateCharts(data) {
            // Destruir instancias previas para evitar conflictos
            Object.values(charts).forEach(c => c.destroy());
            
            renderChartYears(data);
            renderChartPillars(data);
            renderChartAuthorities(data);
        }

        // --- Gráfico: Evolución Anual ---
        function renderChartYears(data) {
            const counts = {};
            data.forEach(d => { const y = d.a || 'N/A'; counts[y] = (counts[y] || 0) + 1; });
            
            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ label: 'Normas', data: Object.values(counts), backgroundColor: '#3b82f6' }]
                },
                options: { plugins: { title: { display: true, text: 'Evolución Anual' } } }
            });
        }

        // --- Gráfico: Pilares ISO (Apilado) ---
        function renderChartPillars(data) {
            // Estructura de datos para el stack
            const isoMap = {
                'ISO 9001': {O:0, I:0, R:0}, 'ISO 14001': {O:0, I:0, R:0}, 
                'ISO 45001': {O:0, I:0, R:0}, 'ISO 27001': {O:0, I:0, R:0}, 
                'ISO 37001': {O:0, I:0, R:0}, 'Otras': {O:0, I:0, R:0}
            };

            data.forEach(d => {
                const p = (d['Pilar del SIG'] || '').toLowerCase();
                const t = (d['Tipo de norma'] || '').toLowerCase();
                let cat = 'Otras';
                
                // Clasificación robusta
                if(p.includes('antisoborno') || p.includes('compliance')) cat = 'ISO 37001';
                else if(p.includes('sst')) cat = 'ISO 45001';
                else if(p.includes('medio ambiente')) cat = 'ISO 14001';
                else if(p.includes('seguridad de la info')) cat = 'ISO 27001';
                else if(p.includes('calidad')) cat = 'ISO 9001';

                if(t.includes('obligatorio')) isoMap[cat].O++;
                else if(t.includes('informativo')) isoMap[cat].I++;
                else if(t.includes('referencial')) isoMap[cat].R++;
            });

            charts.chartPillars = new Chart(document.getElementById('chartPillars'), {
                type: 'bar',
                data: {
                    labels: Object.keys(isoMap),
                    datasets: [
                        { label: 'Obligatoria', data: Object.values(isoMap).map(x => x.O), backgroundColor: '#ef4444' },
                        { label: 'Informativa', data: Object.values(isoMap).map(x => x.I), backgroundColor: '#3b82f6' },
                        { label: 'Referencial', data: Object.values(isoMap).map(x => x.R), backgroundColor: '#22c55e' }
                    ]
                },
                options: {
                    plugins: { title: { display: true, text: 'Distribución por Normas ISO' }, legend: { position: 'bottom' } },
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
        }

        // --- Gráfico: Autoridades (Top 10) ---
        function renderChartAuthorities(data) {
            const counts = {};
            data.forEach(d => { const a = d['Autoridad'] || 'N/A'; counts[a] = (counts[a] || 0) + 1; });
            
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
            
            charts.chartAuthorities = new Chart(document.getElementById('chartAuthorities'), {
                type: 'bar',
                data: {
                    labels: sorted.map(x => x[0]),
                    datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#1e3a8a' }]
                },
                options: { 
                    indexAxis: 'y',
                    plugins: { 
                        legend: { display: false },
                        datalabels: { color: '#ffffff', anchor: 'end', align: 'start', font: { weight: 'bold' } }
                    },
                    scales: { x: { display: false }, y: { grid: { display: false } } }
                }
            });
        }
    </script>
</body>
</html>
