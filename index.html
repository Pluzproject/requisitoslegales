<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Requisitos Legales</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        /* =========================================================
           ESTILOS GENERALES
           ========================================================= */
        .chart-container { 
            position: relative; 
            height: 300px; 
            width: 100%; 
        }
        
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top; 
        }
        
        th { 
            background-color: #f0f9ff; 
            font-weight: 600; 
            color: #1e3a8a; 
            white-space: nowrap; 
        }
        
        tr:hover { 
            background-color: #eff6ff; 
        }

        .main-container {
            max-width: 95%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* =========================================================
           ESPACIADORES PARA MANTENER ESTRUCTURA EXTENSA
           ========================================================= */
        .spacer-10 { height: 10px; }
        .spacer-20 { height: 20px; }
        .spacer-50 { height: 50px; }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8 relative">
        <div class="absolute left-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo-SGI-Blanco-1.png" alt="Logo SGI" class="h-10 w-auto opacity-90">
        </div>
        <div class="flex justify-center items-center">
            <h1 class="text-3xl font-bold tracking-tight">Portal de Requisitos Legales</h1>
        </div>
        <div class="absolute right-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo%20versi%C3%B3n%20color%20blanco.png" alt="Logo Pluz" class="h-10 w-auto opacity-90">
        </div>
    </header>

    <main class="main-container">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-3 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-blue-900 p-6 rounded-xl text-white shadow-lg">
                        <span class="text-xs uppercase opacity-75">Total Normas</span>
                        <div class="text-4xl font-bold mt-2" id="kpi-total">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-emerald-600">Obligatorias</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-obli">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-blue-600">Informativas</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-info">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-amber-600">Referenciales</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-refe">0</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartYears"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartPillars"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartTypes"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-blue-50">
                                <tr>
                                    <th class="w-24">Fecha</th>
                                    <th class="w-32">Norma</th>
                                    <th class="w-24">Pilar</th>
                                    <th class="w-64">Sumilla / Descripción</th>
                                    <th class="w-32">Autoridad</th>
                                    <th class="w-24">Tipo</th>
                                    <th class="w-20">Enlace</th>
                                    <th class="min-w-[400px]">Recomendación</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <aside class="bg-white p-6 rounded-xl border shadow-sm h-fit sticky top-6 space-y-4">
                <h2 class="font-bold text-blue-900 border-b pb-2">Filtros de Búsqueda</h2>
                
                <input type="text" id="searchInput" placeholder="Buscar norma..." class="w-full px-4 py-2 border rounded-lg text-sm">
                
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Rango de Fecha</label>
                    <input type="date" id="filterFechaDesde" class="w-full border rounded-lg text-sm px-3 py-2" title="Desde">
                    <input type="date" id="filterFechaHasta" class="w-full border rounded-lg text-sm px-3 py-2" title="Hasta">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Periodo (Mes/Año)</label>
                    <select id="filterMesAnio" class="w-full border rounded-lg text-sm px-3 py-2">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Año Específico</label>
                    <select id="filterAnio" class="w-full border rounded-lg text-sm px-3 py-2">
                        <option value="">Todos los Años</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500">Categorización</label>
                    <select id="filterPilar" class="w-full border rounded-lg text-sm px-3 py-2">
                        <option value="">Todos los Pilares</option>
                    </select>
                    <select id="filterTipo" class="w-full border rounded-lg text-sm px-3 py-2">
                        <option value="">Todos los Tipos</option>
                    </select>
                </div>
                
                <button id="btnReset" class="w-full bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">RESET FILTROS</button>
            </aside>
        </div>
    </main>

    <script>
        // Configuración inicial de las librerías necesarias
        Chart.register(ChartDataLabels);
        
        // URL de la fuente de datos
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        
        // Variables globales
        let rawData = [];
        let charts = {};

        // Evento que inicia al cargar el documento
        window.addEventListener('DOMContentLoaded', function() {
            fetchData();
            
            // Asignación de listeners a los filtros
            var filterIds = ['searchInput', 'filterFechaDesde', 'filterFechaHasta', 'filterMesAnio', 'filterAnio', 'filterPilar', 'filterTipo'];
            
            for(var i = 0; i < filterIds.length; i++) {
                document.getElementById(filterIds[i]).addEventListener('change', applyFilters);
                document.getElementById(filterIds[i]).addEventListener('input', applyFilters);
            }
            
            document.getElementById('btnReset').addEventListener('click', resetDashboard);
        });

        // Función para cargar los datos y procesarlos
        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = [];
                    
                    for(var i = 0; i < results.data.length; i++) {
                        var row = results.data[i];
                        var normaText = (row['Norma'] || '').trim().toUpperCase();
                        
                        // Excluir filas sin contenido relevante
                        if(normaText !== "" && normaText !== "SIN NOVEDAD") {
                            
                            // Normalización de fechas para compatibilidad
                            var fechaOriginal = (row['Fecha'] || '');
                            var partes = fechaOriginal.split('/');
                            
                            if(partes.length === 3) {
                                var dia = partes[0].padStart(2, '0');
                                var mes = partes[1].padStart(2, '0');
                                var anio = partes[2];
                                
                                row.fEstandar = dia + '/' + mes + '/' + anio;
                                row.rawD = anio + '-' + mes + '-' + dia;
                                row.mesAnio = mes + '/' + anio;
                                row.a = anio;
                            }
                            
                            rawData.push(row);
                        }
                    }
                    
                    populateFilters();
                    renderAll(rawData);
                }
            });
        }

        // Función para llenar los selectores (filtros)
        function populateFilters() {
            
            // Función auxiliar para obtener valores únicos
            function getUniqueValues(key) {
                var values = [];
                for(var i = 0; i < rawData.length; i++) {
                    var val = rawData[i][key];
                    if(val && values.indexOf(val) === -1) {
                        values.push(val);
                    }
                }
                return values;
            }

            // Función para llenar el DOM del select
            function fillSelectElement(id, data, sortDesc) {
                var select = document.getElementById(id);
                
                // Ordenamiento
                if(sortDesc) {
                    data.sort(function(a, b) {
                        var p1 = a.split('/');
                        var p2 = b.split('/');
                        return new Date(p2[1], p2[0] - 1) - new Date(p1[1], p1[0] - 1);
                    });
                } else {
                    data.sort();
                }

                for(var i = 0; i < data.length; i++) {
                    var option = document.createElement('option');
                    option.value = data[i];
                    option.textContent = data[i];
                    select.appendChild(option);
                }
            }

            fillSelectElement('filterMesAnio', getUniqueValues('mesAnio'), true);
            fillSelectElement('filterAnio', getUniqueValues('a'), false);
            fillSelectElement('filterPilar', getUniqueValues('Pilar del SIG'), false);
            fillSelectElement('filterTipo', getUniqueValues('Tipo de norma'), false);
        }

        // Función para renderizar la tabla y KPIs
        function renderAll(data) {
            var tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            // Mostrar los datos más recientes primero
            var reversedData = data.slice().reverse();
            
            for(var i = 0; i < reversedData.length; i++) {
                var item = reversedData[i];
                var tr = document.createElement('tr');
                
                tr.innerHTML = '<td>' + (item.fEstandar || item['Fecha'] || '-') + '</td>' +
                               '<td class="font-bold">' + (item['Norma'] || '-') + '</td>' +
                               '<td>' + (item['Pilar del SIG'] || '-') + '</td>' +
                               '<td class="text-xs">' + (item['Sumilla / Descripción'] || '-') + '</td>' +
                               '<td class="text-xs">' + (item['Autoridad'] || '-') + '</td>' +
                               '<td class="text-xs">' + (item['Tipo de norma'] || '-') + '</td>' +
                               '<td>' + (item['Enlace'] && item['Enlace'] !== '--' ? '<a href="' + item['Enlace'] + '" target="_blank" class="text-blue-600 underline">Ver</a>' : '-') + '</td>' +
                               '<td class="text-xs italic">' + (item['Recomendación'] || '-') + '</td>';
                tbody.appendChild(tr);
            }

            // Calcular KPIs
            var obli = 0;
            var info = 0;
            var refe = 0;
            
            for(var j = 0; j < data.length; j++) {
                var tipo = (data[j]['Tipo de norma'] || '').toUpperCase();
                if(tipo.includes('OBLIGATORIO')) {
                    obli++;
                } else if(tipo.includes('INFORMATIVO')) {
                    info++;
                } else if(tipo.includes('REFERENCIAL')) {
                    refe++;
                }
            }
            
            document.getElementById('kpi-total').textContent = data.length;
            document.getElementById('kpi-obli').textContent = obli;
            document.getElementById('kpi-info').textContent = info;
            document.getElementById('kpi-refe').textContent = refe;
            
            updateCharts(data);
        }

        // Actualizar gráficos
        function updateCharts(data) {
            // Destruir gráficos previos
            if(charts.chartYears) charts.chartYears.destroy();
            if(charts.chartPillars) charts.chartPillars.destroy();
            if(charts.chartTypes) charts.chartTypes.destroy();
            
            function getCounts(key) {
                var counts = {};
                for(var i = 0; i < data.length; i++) {
                    var val = data[i][key] || 'N/A';
                    counts[val] = (counts[val] || 0) + 1;
                }
                return counts;
            }

            // Gráfico Anual
            var dataYears = getCounts('a');
            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar',
                data: {
                    labels: Object.keys(dataYears),
                    datasets: [{ label: 'Normas', data: Object.values(dataYears), backgroundColor: '#3b82f6' }]
                },
                options: { plugins: { title: { display: true, text: 'Evolución Anual' } } }
            });

            // Gráficos circulares
            function createDonut(id, counts, text) {
                return new Chart(document.getElementById(id), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(counts),
                        datasets: [{ data: Object.values(counts), backgroundColor: ['#f87171', '#4ade80', '#60a5fa', '#a78bfa'] }]
                    },
                    options: { 
                        plugins: { 
                            title: { display: true, text: text },
                            datalabels: { formatter: function(v, ctx) { return v + " u."; } }
                        } 
                    }
                });
            }
            
            charts.chartPillars = createDonut('chartPillars', getCounts('Pilar del SIG'), 'Distribución por Pilares');
            charts.chartTypes = createDonut('chartTypes', getCounts('Tipo de norma'), 'Distribución por Tipos');
        }

        // Aplicar filtros lógicos
        function applyFilters() {
            var s = document.getElementById('searchInput').value.toLowerCase();
            var start = document.getElementById('filterFechaDesde').value;
            var end = document.getElementById('filterFechaHasta').value;
            var ma = document.getElementById('filterMesAnio').value;
            var an = document.getElementById('filterAnio').value;
            var pi = document.getElementById('filterPilar').value;
            var ti = document.getElementById('filterTipo').value;

            var filtered = [];
            
            for(var i = 0; i < rawData.length; i++) {
                var item = rawData[i];
                
                var matchS = (item['Norma'].toLowerCase().includes(s) || item['Sumilla / Descripción'].toLowerCase().includes(s));
                var matchRange = (!start || item.rawD >= start) && (!end || item.rawD <= end);
                var matchMA = (!ma || item.mesAnio === ma);
                var matchAN = (!an || item.a === an);
                var matchPI = (!pi || item['Pilar del SIG'] === pi);
                var matchTI = (!ti || item['Tipo de norma'] === ti);
                
                if(matchS && matchRange && matchMA && matchAN && matchPI && matchTI) {
                    filtered.push(item);
                }
            }
            
            renderAll(filtered);
        }

        // Reiniciar dashboard
        function resetDashboard() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterFechaDesde').value = '';
            document.getElementById('filterFechaHasta').value = '';
            document.getElementById('filterMesAnio').value = '';
            document.getElementById('filterAnio').value = '';
            document.getElementById('filterPilar').value = '';
            document.getElementById('filterTipo').value = '';
            
            renderAll(rawData);
        }
    </script>
</body>
</html>
