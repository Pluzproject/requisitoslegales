<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Requisitos Legales</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        /* =========================================================
           ESTILOS GENERALES
           ========================================================= */
        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
        }
        
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top; 
        }
        
        th { 
            background-color: #f0f9ff; 
            font-weight: 600; 
            color: #1e3a8a; 
            white-space: nowrap; 
        }
        
        tr:hover { 
            background-color: #eff6ff; 
        }

        .main-container {
            max-width: 95%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* =========================================================
           ESPACIADORES PARA MANTENER ESTRUCTURA EXTENSA
           ========================================================= */
        .spacer-10 { height: 10px; }
        .spacer-20 { height: 20px; }
        .spacer-50 { height: 50px; }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8 relative">
        <div class="absolute left-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo-SGI-Blanco-1.png" alt="Logo SGI" class="h-10 w-auto opacity-90">
        </div>
        <div class="flex justify-center items-center">
            <h1 class="text-3xl font-bold tracking-tight">Portal de Requisitos Legales</h1>
        </div>
        <div class="absolute right-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo%20versi%C3%B3n%20color%20blanco.png" alt="Logo Pluz" class="h-10 w-auto opacity-90">
        </div>
    </header>

    <main class="main-container space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-blue-900 p-6 rounded-xl text-white shadow-lg">
                <span class="text-xs uppercase opacity-75">Total Normas</span>
                <div class="text-5xl font-bold mt-2" id="kpi-total">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-emerald-600">Obligatorias</span>
                <div class="text-3xl font-bold mt-2" id="kpi-obli">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-blue-600">Informativas</span>
                <div class="text-3xl font-bold mt-2" id="kpi-info">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-amber-600">Referenciales</span>
                <div class="text-3xl font-bold mt-2" id="kpi-refe">0</div>
            </div>
        </div>

        <div class="spacer-20"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl border shadow-sm"><div class="chart-container"><canvas id="chartYears"></canvas></div></div>
            <div class="bg-white p-5 rounded-xl border shadow-sm"><div class="chart-container"><canvas id="chartPillars"></canvas></div></div>
            <div class="bg-white p-5 rounded-xl border shadow-sm"><div class="chart-container"><canvas id="chartTypes"></canvas></div></div>
        </div>

        <div class="spacer-20"></div>

        <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
            <div class="p-5 bg-blue-50 border-b flex flex-wrap gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Buscar..." class="w-full md:w-60 px-4 py-2 border rounded-lg text-sm">
                
                <input type="date" id="filterFecha" class="border rounded-lg text-sm px-3 py-2" title="Seleccionar Día">
                <select id="filterMesAnio" class="border rounded-lg text-sm px-3 py-2"><option value="">Mes/Año</option></select>
                <select id="filterAnio" class="border rounded-lg text-sm px-3 py-2"><option value="">Año</option></select>
                
                <select id="filterPilar" class="border rounded-lg text-sm px-3 py-2"><option value="">Todos los Pilares</option></select>
                <select id="filterTipo" class="border rounded-lg text-sm px-3 py-2"><option value="">Todos los Tipos</option></select>
                
                <button id="btnReset" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">RESET FILTROS</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-blue-50">
                        <tr>
                            <th class="w-24">Fecha</th>
                            <th class="w-32">Norma</th>
                            <th class="w-24">Pilar</th>
                            <th class="w-64">Sumilla / Descripción</th>
                            <th class="w-32">Autoridad</th>
                            <th class="w-24">Tipo</th>
                            <th class="w-20">Enlace</th>
                            <th class="min-w-[400px]">Recomendación</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Configuración inicial de librerías
        Chart.register(ChartDataLabels);
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        let rawData = [];
        let charts = {};

        // Inicialización del DOM
        window.addEventListener('DOMContentLoaded', function() {
            fetchData();
            
            const filters = ['searchInput', 'filterFecha', 'filterMesAnio', 'filterAnio', 'filterPilar', 'filterTipo'];
            for(let i = 0; i < filters.length; i++) {
                document.getElementById(filters[i]).addEventListener('change', applyFilters);
                document.getElementById(filters[i]).addEventListener('input', applyFilters);
            }
            document.getElementById('btnReset').addEventListener('click', resetDashboard);
        });

        // Función para cargar los datos del CSV y normalizarlos
        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = [];
                    for(let i = 0; i < results.data.length; i++) {
                        let row = results.data[i];
                        let normaText = (row['Norma'] || '').trim().toUpperCase();
                        
                        if(normaText !== "" && normaText !== "SIN NOVEDAD") {
                            // Estandarización de fechas
                            let f = (row['Fecha'] || '').split('/');
                            if(f.length === 3) {
                                let d = f[0].padStart(2, '0');
                                let m = f[1].padStart(2, '0');
                                let a = f[2];
                                row.fEstandar = `${d}/${m}/${a}`;
                                row.rawD = `${a}-${m}-${d}`;
                                row.mesAnio = `${m}/${a}`; // Campo para el filtro Mes/Año
                                row.a = a;
                            }
                            rawData.push(row);
                        }
                    }
                    populateFilters();
                    renderAll(rawData);
                }
            });
        }

        // Función para poblar dinámicamente los selectores
        function populateFilters() {
            const getUnique = function(key) {
                let list = [];
                for(let i = 0; i < rawData.length; i++) {
                    let val = rawData[i][key];
                    if(val && list.indexOf(val) === -1) list.push(val);
                }
                return list.sort();
            };

            const fillSelect = function(id, data) {
                let select = document.getElementById(id);
                for(let i = 0; i < data.length; i++) {
                    let opt = document.createElement('option');
                    opt.value = data[i];
                    opt.textContent = data[i];
                    select.appendChild(opt);
                }
            };

            fillSelect('filterMesAnio', getUnique('mesAnio'));
            fillSelect('filterAnio', getUnique('a'));
            fillSelect('filterPilar', getUnique('Pilar del SIG'));
            fillSelect('filterTipo', getUnique('Tipo de norma'));
        }

        // Función para renderizar tabla y KPIs
        function renderAll(data) {
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let reversed = [...data].reverse();
            for(let i = 0; i < reversed.length; i++) {
                let item = reversed[i];
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.fEstandar || item['Fecha'] || '-'}</td>
                    <td class="font-bold">${item['Norma'] || '-'}</td>
                    <td>${item['Pilar del SIG'] || '-'}</td>
                    <td class="text-xs">${item['Sumilla / Descripción'] || '-'}</td>
                    <td class="text-xs">${item['Autoridad'] || '-'}</td>
                    <td class="text-xs">${item['Tipo de norma'] || '-'}</td>
                    <td>${(item['Enlace'] && item['Enlace'] !== '--') ? `<a href="${item['Enlace']}" target="_blank" class="text-blue-600 underline">Ver</a>` : '-'}</td>
                    <td class="text-xs italic">${item['Recomendación'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            }

            let obli = 0, info = 0, refe = 0;
            for(let i = 0; i < data.length; i++) {
                let t = (data[i]['Tipo de norma'] || '').toUpperCase();
                if(t.includes('OBLIGATORIO')) obli++;
                else if(t.includes('INFORMATIVO')) info++;
                else if(t.includes('REFERENCIAL')) refe++;
            }
            
            document.getElementById('kpi-total').textContent = data.length;
            document.getElementById('kpi-obli').textContent = obli;
            document.getElementById('kpi-info').textContent = info;
            document.getElementById('kpi-refe').textContent = refe;
            
            updateCharts(data);
        }

        // Lógica de actualización de gráficos
        function updateCharts(data) {
            ['chartYears', 'chartPillars', 'chartTypes'].forEach(id => { if(charts[id]) charts[id].destroy(); });
            
            const getCounts = function(key) {
                let counts = {};
                for(let i = 0; i < data.length; i++) {
                    let val = data[i][key] || 'N/A';
                    counts[val] = (counts[val] || 0) + 1;
                }
                return counts;
            };

            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar', 
                data: { labels: Object.keys(getCounts('a')), datasets: [{ label: 'Normas', data: Object.values(getCounts('a')), backgroundColor: '#3b82f6' }] }, 
                options: { plugins: { title: { display: true, text: 'Evolución Anual' } } }
            });
            
            const createDoughnut = function(canvasId, dataObj, titleText) {
                return new Chart(document.getElementById(canvasId), {
                    type: 'doughnut',
                    data: { labels: Object.keys(dataObj), datasets: [{ data: Object.values(dataObj), backgroundColor: ['#f87171', '#4ade80', '#60a5fa', '#a78bfa'] }] },
                    options: { plugins: { title: { display: true, text: titleText }, datalabels: { formatter: (v, ctx) => { const s = ctx.dataset.data.reduce((a, b) => a+b, 0); return ((v*100)/s).toFixed(1) + "%"; } } } }
                });
            };
            
            charts.chartPillars = createDoughnut('chartPillars', getCounts('Pilar del SIG'), 'Distribución por Pilares');
            charts.chartTypes = createDoughnut('chartTypes', getCounts('Tipo de norma'), 'Distribución por Tipos');
        }

        // Lógica de filtrado concurrente
        function applyFilters() {
            let s = document.getElementById('searchInput').value.toLowerCase();
            let d = document.getElementById('filterFecha').value;
            let ma = document.getElementById('filterMesAnio').value;
            let a = document.getElementById('filterAnio').value;
            let p = document.getElementById('filterPilar').value;
            let t = document.getElementById('filterTipo').value;

            let filtered = [];
            for(let i = 0; i < rawData.length; i++) {
                let item = rawData[i];
                let matchS = (item['Norma'].toLowerCase().includes(s) || item['Sumilla / Descripción'].toLowerCase().includes(s));
                let matchD = (!d || item.rawD === d);
                let matchMA = (!ma || item.mesAnio === ma);
                let matchA = (!a || item.a === a);
                let matchP = (!p || item['Pilar del SIG'] === p);
                let matchT = (!t || item['Tipo de norma'] === t);

                if(matchS && matchD && matchMA && matchA && matchP && matchT) {
                    filtered.push(item);
                }
            }
            renderAll(filtered);
        }

        // Reset total
        function resetDashboard() {
            let ids = ['searchInput', 'filterFecha', 'filterMesAnio', 'filterAnio', 'filterPilar', 'filterTipo'];
            for(let i = 0; i < ids.length; i++) {
                document.getElementById(ids[i]).value = '';
            }
            renderAll(rawData);
        }
    </script>
</body>
</html>
