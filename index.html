<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Requisitos Legales - SIG</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .chart-container { position: relative; height: 240px; width: 100%; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dbeafe; }
        th { background-color: #f0f9ff; font-weight: 600; color: #1e3a8a; }
        tr:hover { background-color: #eff6ff; }
        .filter-card { cursor: pointer; transition: all 0.2s ease; }
        .filter-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Matriz de Requisitos Legales</h1>
                <p class="text-blue-300 text-sm mt-1">Sistemas Integrados de Gestión (SIG)</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="resetDashboard()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">BORRAR FILTROS</button>
                <div id="loader" class="flex items-center gap-2 bg-blue-800 px-4 py-2 rounded-lg border border-blue-700">
                    <span class="animate-ping h-2.5 w-2.5 rounded-full bg-blue-400"></span>
                    <span class="text-xs text-blue-100 font-medium">Sincronizando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-5" id="kpi-container"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100">
                <h3 class="text-sm font-semibold text-blue-800 mb-4">Volumen por Año</h3>
                <div class="chart-container"><canvas id="chartYears"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100">
                <h3 class="text-sm font-semibold text-blue-800 mb-4">Distribución por Pilar</h3>
                <div class="chart-container"><canvas id="chartPillars"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100">
                <h3 class="text-sm font-semibold text-blue-800 mb-4">Tipo de Norma</h3>
                <div class="chart-container"><canvas id="chartTypes"></canvas></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
            <div class="p-5 bg-blue-50 border-b border-blue-100 flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="Buscar norma o descripción..." class="w-full md:w-96 px-4 py-2 border rounded-lg text-sm">
                <select id="filterPilar" class="border rounded-lg text-sm px-3 py-2"><option value="">Todos los Pilares</option></select>
                <select id="filterTipo" class="border rounded-lg text-sm px-3 py-2"><option value="">Todos los Tipos</option></select>
            </div>
            <div class="overflow-x-auto max-h-[550px] overflow-y-auto">
                <table class="min-w-full">
                    <thead class="bg-blue-50 sticky top-0">
                        <tr><th>Fecha</th><th>Norma</th><th>Pilar</th><th>Sumilla / Descripción</th><th>Autoridad</th><th>Tipo</th></tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        let rawData = [], charts = {};

        window.addEventListener('DOMContentLoaded', () => { 
            Papa.parse(csvUrl, { download: true, header: true, skipEmptyLines: true, complete: (res) => { 
                rawData = res.data;
                document.getElementById('loader').style.display = 'none';
                populateDropdowns(rawData);
                renderAll(rawData);
            }});
        });

        function populateDropdowns(data) {
            const pilares = [...new Set(data.map(i => i['Pilar del SIG']).filter(Boolean))];
            const tipos = [...new Set(data.map(i => i['Tipo de norma']).filter(Boolean))];
            const pilarSel = document.getElementById('filterPilar');
            const tipoSel = document.getElementById('filterTipo');
            
            pilares.forEach(p => pilarSel.innerHTML += `<option value="${p}">${p}</option>`);
            tipos.forEach(t => tipoSel.innerHTML += `<option value="${t}">${t}</option>`);
            
            pilarSel.addEventListener('change', applyFilters);
            tipoSel.addEventListener('change', applyFilters);
            document.getElementById('searchInput').addEventListener('input', applyFilters);
        }

        function resetDashboard() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterPilar').value = '';
            document.getElementById('filterTipo').value = '';
            renderAll(rawData);
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const pilar = document.getElementById('filterPilar').value;
            const tipo = document.getElementById('filterTipo').value;
            const filtered = rawData.filter(i => 
                ((i['Norma']||'').toLowerCase().includes(search) || (i['Sumilla / Descripción']||'').toLowerCase().includes(search)) && 
                (!pilar || i['Pilar del SIG'] === pilar) && 
                (!tipo || i['Tipo de norma'] === tipo)
            );
            renderAll(filtered);
        }

        function renderAll(data) {
            renderTable(data);
            renderKPIs(data);
            updateCharts(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = [...data].reverse().map(i => `
                <tr><td class="text-blue-500">${i['Fecha']||'-'}</td><td class="font-bold text-blue-900">${i['Norma']||'-'}</td>
                <td><span class="px-2 py-1 bg-blue-100 rounded text-xs">${i['Pilar del SIG']||'-'}</span></td>
                <td class="text-blue-800">${i['Sumilla / Descripción']||'-'}</td><td class="text-blue-600">${i['Autoridad']||'-'}</td><td>${i['Tipo de norma']||'-'}</td></tr>
            `).join('');
        }

        function renderKPIs(data) {
            const pilares = [...new Set(rawData.map(i => i['Pilar del SIG']).filter(Boolean))];
            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-5 rounded-xl border shadow-sm"><span class="text-xs uppercase font-bold text-blue-400">Total</span><div class="text-3xl font-bold mt-2">${data.length}</div></div>
                ${pilares.map(p => `<div class="bg-white p-5 rounded-xl border shadow-sm filter-card" onclick="document.getElementById('filterPilar').value='${p}'; applyFilters();"><span class="text-xs uppercase font-bold text-blue-400">${p}</span><div class="text-2xl font-bold mt-2 text-blue-700">${data.filter(i => i['Pilar del SIG'] === p).length}</div></div>`).join('')}
            `;
        }

        function updateCharts(data) {
            ['chartYears', 'chartPillars', 'chartTypes'].forEach(id => { if(charts[id]) charts[id].destroy(); });
            const counts = (key) => data.reduce((a, i) => { a[i[key]||'N/A'] = (a[i[key]||'N/A']||0)+1; return a; }, {});
            
            charts.chartYears = new Chart(document.getElementById('chartYears'), {type:'bar', data:{labels:Object.keys(counts('Fecha')), datasets:[{data:Object.values(counts('Fecha')), backgroundColor:'#3b82f6'}]}});
            charts.chartPillars = new Chart(document.getElementById('chartPillars'), {type:'doughnut', data:{labels:Object.keys(counts('Pilar del SIG')), datasets:[{data:Object.values(counts('Pilar del SIG')), backgroundColor:['#3b82f6','#10b981','#f59e0b']}]}});
            charts.chartTypes = new Chart(document.getElementById('chartTypes'), {type:'pie', data:{labels:Object.keys(counts('Tipo de norma')), datasets:[{data:Object.values(counts('Tipo de norma')), backgroundColor:['#8b5cf6','#ef4444']}]}});
        }
    </script>
</body>
</html>
