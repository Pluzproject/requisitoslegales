<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Requisitos Legales | SGI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        /* =====================================================================================
           ESTILOS CSS - ESTRUCTURA Y DISEÑO
           ===================================================================================== */
        
        /* Contenedor principal de los gráficos */
        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
            padding: 10px;
        }
        
        /* Configuración de tablas */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 20px;
        }
        
        /* Encabezados de tabla */
        th { 
            padding: 15px; 
            border-bottom: 2px solid #bfdbfe; 
            background-color: #f0f9ff; 
            color: #1e3a8a; 
            font-weight: 700; 
            text-align: left; 
            white-space: nowrap; 
        }
        
        /* Celdas de contenido */
        td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top; 
            color: #334155;
        }
        
        /* Efecto hover en filas */
        tr:hover { 
            background-color: #eff6ff; 
            transition: background-color 0.2s ease;
        }

        /* Contenedor principal */
        .main-container {
            max-width: 95%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Espaciadores para mantener la estructura visual */
        .spacer-10 { height: 10px; }
        .spacer-20 { height: 20px; }
        .spacer-50 { height: 50px; }
        
        /* Estilos específicos para inputs */
        .input-filter {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8 relative">
        <div class="absolute left-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo-SGI-Blanco-1.png" alt="Logo SGI" class="h-10 w-auto opacity-90">
        </div>
        <div class="flex justify-center items-center">
            <h1 class="text-3xl font-bold tracking-tight">Portal de Requisitos Legales</h1>
        </div>
        <div class="absolute right-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo%20versi%C3%B3n%20color%20blanco.png" alt="Logo Pluz" class="h-10 w-auto opacity-90">
        </div>
    </header>

    <main class="main-container">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-3 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-blue-900 p-6 rounded-xl text-white shadow-lg">
                        <span class="text-xs uppercase opacity-75">Total Normas</span>
                        <div class="text-4xl font-bold mt-2" id="kpi-total">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-red-600">Obligatorias</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-obli">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-blue-600">Informativas</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-info">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <span class="text-xs uppercase font-bold text-green-600">Referenciales</span>
                        <div class="text-3xl font-bold mt-2" id="kpi-refe">0</div>
                    </div>
                </div>

                <div class="spacer-20"></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartYears"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartPillars"></canvas></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border shadow-sm">
                        <div class="chart-container"><canvas id="chartAuthorities"></canvas></div>
                    </div>
                </div>

                <div class="spacer-20"></div>

                <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table id="tableData">
                            <thead class="bg-blue-50">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Norma</th>
                                    <th>Pilar</th>
                                    <th>Sumilla / Descripción</th>
                                    <th>Autoridad</th>
                                    <th>Tipo</th>
                                    <th>Enlace</th>
                                    <th>Recomendación</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <aside class="bg-white p-6 rounded-xl border shadow-sm h-fit sticky top-6 space-y-4">
                <h2 class="font-bold text-blue-900 border-b pb-2">Filtros de Búsqueda</h2>
                
                <input type="text" id="searchInput" placeholder="Buscar norma..." class="input-filter">
                <input type="date" id="filterFecha" class="input-filter">
                
                <select id="filterMesAnio" class="input-filter">
                    <option value="">Periodo...</option>
                </select>
                
                <select id="filterAnio" class="input-filter">
                    <option value="">Año...</option>
                </select>
                
                <select id="filterPilar" class="input-filter">
                    <option value="">Pilares...</option>
                </select>
                
                <select id="filterTipo" class="input-filter">
                    <option value="">Tipos...</option>
                </select>
                
                <button id="btnReset" class="w-full bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">RESET FILTROS</button>
            </aside>
        </div>
    </main>

    <script>
        // Registrar plugin de etiquetas en gráficos
        Chart.register(ChartDataLabels);

        // URL del CSV (Google Sheets)
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        
        // Variables globales para los datos y los gráficos
        var rawData = [];
        var charts = {};

        // INICIALIZACIÓN DEL DOCUMENTO
        window.addEventListener('DOMContentLoaded', function() {
            // Cargar datos al iniciar
            fetch(csvUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(textData) {
                    Papa.parse(textData, { 
                        header: true, 
                        skipEmptyLines: true, 
                        complete: function(results) {
                            // Procesamiento inicial de la data
                            rawData = [];
                            var dataArray = results.data;
                            
                            for (var i = 0; i < dataArray.length; i++) {
                                var row = dataArray[i];
                                // Filtrar filas vacías o sin norma
                                if (row['Norma'] && row['Norma'].trim() !== "") {
                                    // Procesar fechas para filtros
                                    var fechaStr = row['Fecha'] || "";
                                    var fParts = fechaStr.split('/');
                                    if (fParts.length === 3) {
                                        row.a = fParts[2]; // Año
                                        row.rawD = fParts[2] + '-' + fParts[1] + '-' + fParts[0]; // Formato para comparación
                                        row.mesAnio = fParts[1] + '/' + fParts[2]; // Periodo
                                    }
                                    rawData.push(row);
                                }
                            }
                            
                            // Poblar selectores de filtro
                            fillFilterOptions();
                            
                            // Renderizar todo el dashboard
                            renderEverything(rawData);
                        }
                    });
                });
        });

        // FUNCIÓN: Poblar selectores
        function fillFilterOptions() {
            var filterIds = ['filterAnio', 'filterPilar', 'filterTipo'];
            
            for (var i = 0; i < filterIds.length; i++) {
                var id = filterIds[i];
                var selectElement = document.getElementById(id);
                var columnKey = "";
                
                if (id === 'filterPilar') columnKey = 'Pilar del SIG';
                else if (id === 'filterTipo') columnKey = 'Tipo de norma';
                else columnKey = 'a';
                
                // Extraer valores únicos
                var uniqueValues = [];
                for (var j = 0; j < rawData.length; j++) {
                    var val = rawData[j][columnKey];
                    if (val && uniqueValues.indexOf(val) === -1) {
                        uniqueValues.push(val);
                    }
                }
                
                // Ordenar valores
                uniqueValues.sort();
                
                // Crear opciones
                for (var k = 0; k < uniqueValues.length; k++) {
                    var opt = document.createElement('option');
                    opt.value = uniqueValues[k];
                    opt.textContent = uniqueValues[k];
                    selectElement.appendChild(opt);
                }
            }
        }

        // FUNCIÓN: Renderizar tabla y KPIs
        function renderEverything(data) {
            // Renderizar Tabla
            var tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            for (var i = 0; i < data.length; i++) {
                var row = data[i];
                var tr = document.createElement('tr');
                
                var tdFecha = document.createElement('td'); tdFecha.textContent = row['Fecha'] || '-';
                var tdNorma = document.createElement('td'); tdNorma.textContent = row['Norma'] || '-';
                var tdPilar = document.createElement('td'); tdPilar.textContent = row['Pilar del SIG'] || '-';
                var tdSumilla = document.createElement('td'); tdSumilla.className = "text-xs"; tdSumilla.textContent = row['Sumilla / Descripción'] || '-';
                var tdAutoridad = document.createElement('td'); tdAutoridad.textContent = row['Autoridad'] || '-';
                var tdTipo = document.createElement('td'); tdTipo.textContent = row['Tipo de norma'] || '-';
                var tdEnlace = document.createElement('td');
                
                if (row['Enlace']) {
                    var a = document.createElement('a');
                    a.href = row['Enlace'];
                    a.target = "_blank";
                    a.className = "text-blue-600 underline";
                    a.textContent = "Ver";
                    tdEnlace.appendChild(a);
                } else {
                    tdEnlace.textContent = "-";
                }
                
                var tdRecomendacion = document.createElement('td'); tdRecomendacion.className = "text-xs"; tdRecomendacion.textContent = row['Recomendación'] || '';
                
                tr.appendChild(tdFecha);
                tr.appendChild(tdNorma);
                tr.appendChild(tdPilar);
                tr.appendChild(tdSumilla);
                tr.appendChild(tdAutoridad);
                tr.appendChild(tdTipo);
                tr.appendChild(tdEnlace);
                tr.appendChild(tdRecomendacion);
                
                tbody.appendChild(tr);
            }
            
            // Actualizar KPIs
            var total = data.length;
            var obli = 0;
            var info = 0;
            var refe = 0;
            
            for (var j = 0; j < data.length; j++) {
                var tipoNorma = (data[j]['Tipo de norma'] || '').toLowerCase();
                if (tipoNorma.indexOf('obligatorio') !== -1) obli++;
                else if (tipoNorma.indexOf('informativo') !== -1) info++;
                else if (tipoNorma.indexOf('referencial') !== -1) refe++;
            }
            
            document.getElementById('kpi-total').textContent = total;
            document.getElementById('kpi-obli').textContent = obli;
            document.getElementById('kpi-info').textContent = info;
            document.getElementById('kpi-refe').textContent = refe;
            
            // Actualizar Gráficos
            updateAllCharts(data);
        }

        // FUNCIÓN: Gestión de Gráficos
        function updateAllCharts(data) {
            // Destruir instancias previas
            for (var key in charts) {
                if (charts.hasOwnProperty(key)) {
                    charts[key].destroy();
                }
            }
            
            // --- GRÁFICO 1: EVOLUCIÓN ANUAL ---
            var yearsCount = {};
            for (var i = 0; i < data.length; i++) {
                var y = data[i].a || 'N/A';
                if (!yearsCount[y]) yearsCount[y] = 0;
                yearsCount[y]++;
            }
            
            var yLabels = Object.keys(yearsCount);
            var yValues = [];
            for (var l = 0; l < yLabels.length; l++) {
                yValues.push(yearsCount[yLabels[l]]);
            }
            
            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar',
                data: {
                    labels: yLabels,
                    datasets: [{ label: 'Normas', data: yValues, backgroundColor: '#3b82f6' }]
                },
                options: { plugins: { title: { display: true, text: 'Evolución Anual' } } }
            });
            
            // --- GRÁFICO 2: PILARES (APILADO) ---
            // Lógica para ISO 37001 y resto de pilares
            var pData = {};
            for (var j = 0; j < data.length; j++) {
                var pilarRaw = data[j]['Pilar del SIG'] || 'Sin Pilar';
                var pilarFinal = pilarRaw;
                
                // Normalización de nombre para ISO 37001
                if (pilarRaw.toLowerCase().indexOf('antisoborno') !== -1 || pilarRaw.toLowerCase().indexOf('compliance') !== -1) {
                    pilarFinal = 'ISO 37001';
                }
                
                if (!pData[pilarFinal]) pData[pilarFinal] = {O:0, I:0, R:0};
                
                var t = (data[j]['Tipo de norma'] || '').toLowerCase();
                if (t.indexOf('obligatorio') !== -1) pData[pilarFinal].O++;
                else if (t.indexOf('informativo') !== -1) pData[pilarFinal].I++;
                else if (t.indexOf('referencial') !== -1) pData[pilarFinal].R++;
            }
            
            var pLabels = Object.keys(pData);
            var dObligatoria = [];
            var dInformativa = [];
            var dReferencial = [];
            
            for (var k = 0; k < pLabels.length; k++) {
                var label = pLabels[k];
                dObligatoria.push(pData[label].O);
                dInformativa.push(pData[label].I);
                dRReferencial.push(pData[label].R); // Nota: Se mantiene lógica explícita
            }
            
            // (Corrección pequeña por legibilidad en el loop anterior, asumiendo estructura correcta)
            // Re-mapeo para asegurar consistencia
            dRReferencial = [];
            for (var l = 0; l < pLabels.length; l++) {
                dRReferencial.push(pData[pLabels[l]].R);
            }

            charts.chartPillars = new Chart(document.getElementById('chartPillars'), {
                type: 'bar',
                data: {
                    labels: pLabels,
                    datasets: [
                        { label: 'Obligatoria', data: dObligatoria, backgroundColor: '#ef4444' },
                        { label: 'Informativa', data: dInformativa, backgroundColor: '#3b82f6' },
                        { label: 'Referencial', data: dRReferencial, backgroundColor: '#22c55e' }
                    ]
                },
                options: { 
                    plugins: { title: { display: true, text: 'Distribución por Pilar' }, legend: { position: 'bottom' } },
                    scales: { x: { stacked: true }, y: { stacked: true } }
                }
            });
            
            // --- GRÁFICO 3: AUTORIDADES ---
            var authCount = {};
            for (var m = 0; m < data.length; m++) {
                var auth = data[m]['Autoridad'] || 'N/A';
                if (!authCount[auth]) authCount[auth] = 0;
                authCount[auth]++;
            }
            
            // Convertir a array para ordenar
            var authArray = [];
            for (var key in authCount) {
                authArray.push({ name: key, count: authCount[key] });
            }
            authArray.sort(function(a, b) { return b.count - a.count; });
            
            var top10 = authArray.slice(0, 10);
            
            charts.chartAuthorities = new Chart(document.getElementById('chartAuthorities'), {
                type: 'bar',
                data: {
                    labels: top10.map(function(item) { return item.name; }),
                    datasets: [{ data: top10.map(function(item) { return item.count; }), backgroundColor: '#1e3a8a' }]
                },
                options: { 
                    indexAxis: 'y',
                    plugins: { title: { display: true, text: 'Top 10 Autoridades' }, legend: { display: false } },
                    scales: { x: { display: false }, y: { grid: { display: false } } }
                }
            });
        }

        // EVENTOS DE FILTRADO
        var filterInputs = ['searchInput', 'filterAnio', 'filterPilar', 'filterTipo'];
        
        for (var i = 0; i < filterInputs.length; i++) {
            document.getElementById(filterInputs[i]).addEventListener('input', function() {
                // Capturar valores
                var valSearch = document.getElementById('searchInput').value.toLowerCase();
                var valAnio = document.getElementById('filterAnio').value;
                var valPilar = document.getElementById('filterPilar').value;
                var valTipo = document.getElementById('filterTipo').value;
                
                // Filtrar data original
                var filtered = [];
                for (var j = 0; j < rawData.length; j++) {
                    var item = rawData[j];
                    
                    var matchSearch = (item['Norma'].toLowerCase().indexOf(valSearch) !== -1 || item['Sumilla / Descripción'].toLowerCase().indexOf(valSearch) !== -1);
                    var matchAnio = (valAnio === "" || item.a === valAnio);
                    var matchPilar = (valPilar === "" || item['Pilar del SIG'] === valPilar);
                    var matchTipo = (valTipo === "" || item['Tipo de norma'] === valTipo);
                    
                    if (matchSearch && matchAnio && matchPilar && matchTipo) {
                        filtered.push(item);
                    }
                }
                
                // Renderizar
                renderEverything(filtered);
            });
        }

        // RESET DE FILTROS
        document.getElementById('btnReset').addEventListener('click', function() {
            // Recargar página para limpiar todo
            window.location.reload();
        });
        
    </script>
</body>
</html>
