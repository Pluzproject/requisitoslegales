<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Requisitos Legales - SIG</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        .chart-container { position: relative; height: 240px; width: 100%; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dbeafe; }
        th { background-color: #f0f9ff; font-weight: 600; color: #1e3a8a; }
        tr:hover { background-color: #eff6ff; }
        .filter-btn:hover { cursor: pointer; opacity: 0.8; transform: translateY(-2px); transition: 0.2s; }
    </style>
</head>
<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Matriz de Requisitos Legales</h1>
                <p class="text-blue-300 text-sm mt-1">Sistemas Integrados de Gestión (SIG)</p>
            </div>
            <button onclick="resetFilters()" class="text-xs bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg text-white font-bold">LIMPIAR FILTROS</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100 flex flex-col">
                <span class="text-xs font-semibold text-blue-400 uppercase tracking-wider">Total Normas</span>
                <span class="text-3xl font-bold text-blue-900 mt-2" id="kpi-total">0</span>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-200 border-l-4 border-l-emerald-500 filter-btn" onclick="filterBy('Pilar', 'SST')">
                <span class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Filtro: Pilar SST</span>
                <span class="text-3xl font-bold text-emerald-700 mt-2" id="kpi-sst">0</span>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100 flex flex-col">
                <span class="text-xs font-semibold text-blue-400 uppercase tracking-wider">Normas Informativas</span>
                <span class="text-3xl font-bold text-indigo-600 mt-2" id="kpi-info">0</span>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-200 border-l-4 border-l-amber-500 filter-btn" onclick="filterBy('Año', '2026')">
                <span class="text-xs font-semibold text-amber-600 uppercase tracking-wider">Filtro: Año Actual (2026)</span>
                <span class="text-3xl font-bold text-amber-700 mt-2" id="kpi-year">-</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100"><div class="chart-container"><canvas id="chartYears"></canvas></div></div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100"><div class="chart-container"><canvas id="chartPillars"></canvas></div></div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100"><div class="chart-container"><canvas id="chartTypes"></canvas></div></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
            <div class="p-5 bg-blue-50 border-b border-blue-100"><input type="text" id="searchInput" placeholder="Buscar..." class="w-full px-4 py-2 border border-blue-200 rounded-lg text-sm"></div>
            <div class="overflow-x-auto max-h-[550px] overflow-y-auto">
                <table class="min-w-full"><tbody id="tableBody" class="text-sm"></tbody></table>
            </div>
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        let rawData = [], charts = {};

        function fetchAndParseCSV() {
            Papa.parse(csvUrl, { download: true, header: true, complete: (res) => { rawData = res.data; renderAll(rawData); }});
        }

        function filterBy(type, val) {
            let filtered = rawData.filter(i => type === 'Pilar' ? i['Pilar del SIG'] === val : (i['Fecha']||'').includes(val));
            renderAll(filtered);
        }

        function resetFilters() { renderAll(rawData); }

        function renderAll(data) {
            renderTable(data);
            updateKPIs(data);
            updateCharts(data);
        }

        function renderTable(data) {
            document.getElementById('tableBody').innerHTML = [...data].reverse().map(i => `<tr><td>${i['Fecha']||'-'}</td><td class="font-bold">${i['Norma']||'-'}</td><td>${i['Pilar del SIG']||'-'}</td><td>${i['Sumilla / Descripción']||'-'}</td></tr>`).join('');
        }

        function updateKPIs(data) {
            document.getElementById('kpi-total').innerText = data.length;
            document.getElementById('kpi-sst').innerText = data.filter(i => i['Pilar del SIG'] === 'SST').length;
            document.getElementById('kpi-info').innerText = data.filter(i => i['Tipo de norma'] === 'Informativo').length;
            document.getElementById('kpi-year').innerText = "2026";
        }
        
        // ... (resto de funciones de gráficos igual)
        fetchAndParseCSV();
    </script>
</body>
</html>
