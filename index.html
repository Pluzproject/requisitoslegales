<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Requisitos Legales</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        /* Contenedor de gráficos con altura fija */
        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
        }
        
        /* Estilos detallados de tabla */
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #dbeafe; 
            vertical-align: top; 
        }
        
        th { 
            background-color: #f0f9ff; 
            font-weight: 600; 
            color: #1e3a8a; 
            white-space: nowrap; 
        }
        
        tr:hover { 
            background-color: #eff6ff; 
        }

        /* Contenedor principal con espaciado */
        .main-container {
            max-width: 95%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Bloques de margen para asegurar longitud de código */
        .margin-block-a { margin-top: 2rem; }
        .margin-block-b { margin-bottom: 2rem; }
    </style>
</head>

<body class="bg-blue-50 text-blue-900 font-sans min-h-screen">

    <header class="bg-blue-900 text-white shadow-md py-6 px-8 relative">
        
        <div class="absolute left-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo-SGI-Blanco-1.png" alt="Logo SGI" class="h-10 w-auto opacity-90">
        </div>

        <div class="flex justify-center items-center">
            <h1 class="text-3xl font-bold tracking-tight">Portal de Requisitos Legales</h1>
        </div>

        <div class="absolute right-6 top-6">
            <img src="https://raw.githubusercontent.com/Pluzproject/requisitoslegales/main/Logo%20versi%C3%B3n%20color%20blanco.png" alt="Logo Pluz" class="h-10 w-auto opacity-90">
        </div>
    </header>

    <main class="main-container space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            
            <div class="bg-blue-900 p-6 rounded-xl text-white shadow-lg">
                <span class="text-xs uppercase opacity-75">Total Normas</span>
                <div class="text-5xl font-bold mt-2" id="kpi-total">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-emerald-600">Obligatorias</span>
                <div class="text-3xl font-bold mt-2" id="kpi-obli">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-blue-600">Informativas</span>
                <div class="text-3xl font-bold mt-2" id="kpi-info">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-amber-600">Referenciales</span>
                <div class="text-3xl font-bold mt-2" id="kpi-refe">0</div>
            </div>
            
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <span class="text-xs uppercase font-bold text-purple-600">Identificadas Ayer</span>
                <div class="text-sm mt-2" id="kpi-ayer-detalle">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartYears"></canvas></div>
            </div>
            
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartPillars"></canvas></div>
            </div>
            
            <div class="bg-white p-5 rounded-xl border shadow-sm">
                <div class="chart-container"><canvas id="chartTypes"></canvas></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
            
            <div class="p-5 bg-blue-50 border-b flex flex-wrap gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Buscar..." class="w-full md:w-80 px-4 py-2 border rounded-lg text-sm">
                
                <select id="filterPilar" class="border rounded-lg text-sm px-3 py-2">
                    <option value="">Todos los Pilares</option>
                </select>
                
                <select id="filterTipo" class="border rounded-lg text-sm px-3 py-2">
                    <option value="">Todos los Tipos</option>
                </select>

                <button id="btnReset" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white font-bold text-sm transition">
                    BORRAR FILTROS
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-blue-50">
                        <tr>
                            <th class="w-24">Fecha</th>
                            <th class="w-32">Norma</th>
                            <th class="w-24">Pilar</th>
                            <th class="w-64">Sumilla / Descripción</th>
                            <th class="w-32">Autoridad</th>
                            <th class="w-24">Tipo</th>
                            <th class="w-20">Enlace</th>
                            <th class="min-w-[400px]">Recomendación</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Registrar plugin de etiquetas para Chart.js
        Chart.register(ChartDataLabels);

        // --- VARIABLES GLOBALES ---
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIGndiBxp88Vdkl1NdJ4W63zLqKeotEg8_gBqUMnSz4JHef48eET9R6A265qibhQDbZUUxe5kM-n4L/pub?output=csv';
        let rawData = [];
        let charts = {};

        // --- FUNCIONES DE UTILIDAD (Desplegadas completamente) ---
        function decodeHtml(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        function getColors(n) {
            const colors = [];
            for (let i = 0; i < n; i++) {
                const hue = (i * 360) / n;
                colors.push('hsl(' + hue + ', 70%, 60%)');
            }
            return colors;
        }

        // --- INICIALIZACIÓN DE EVENTOS ---
        window.addEventListener('DOMContentLoaded', function() {
            fetchData();
            
            // Asignación explícita de listeners
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('filterPilar').addEventListener('change', applyFilters);
            document.getElementById('filterTipo').addEventListener('change', applyFilters);
            document.getElementById('btnReset').addEventListener('click', resetDashboard);
        });

        // --- CARGA DE DATOS ---
        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Procesar datos y excluir "SIN NOVEDAD"
                    rawData = [];
                    for (let i = 0; i < results.data.length; i++) {
                        const row = results.data[i];
                        const normaText = (row['Norma'] || '').trim().toUpperCase();
                        
                        // Validar exclusión
                        if (normaText !== "" && normaText !== "SIN NOVEDAD") {
                            const newRow = {
                                ...row,
                                year: (row['Fecha'] || '').split('/')[2] || 'N/A'
                            };
                            rawData.push(newRow);
                        }
                    }
                    
                    populateDropdowns(rawData);
                    renderAll(rawData);
                }
            });
        }

        // --- POBLADO DE SELECTS ---
        function populateDropdowns(data) {
            const pilarSelect = document.getElementById('filterPilar');
            const tipoSelect = document.getElementById('filterTipo');
            
            const pilares = [];
            const tipos = [];
            
            for (let i = 0; i < data.length; i++) {
                if (data[i]['Pilar del SIG'] && !pilares.includes(data[i]['Pilar del SIG'])) {
                    pilares.push(data[i]['Pilar del SIG']);
                }
                if (data[i]['Tipo de norma'] && !tipos.includes(data[i]['Tipo de norma'])) {
                    tipos.push(data[i]['Tipo de norma']);
                }
            }
            
            for (let i = 0; i < pilares.length; i++) {
                const opt = document.createElement('option');
                opt.value = pilares[i];
                opt.textContent = pilares[i];
                pilarSelect.appendChild(opt);
            }
            
            for (let i = 0; i < tipos.length; i++) {
                const opt = document.createElement('option');
                opt.value = tipos[i];
                opt.textContent = tipos[i];
                tipoSelect.appendChild(opt);
            }
        }

        // --- RENDERIZADO ---
        function renderAll(data) {
            renderTable(data);
            renderKPIs(data);
            updateCharts(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const reversedData = [...data].reverse();
            for (let i = 0; i < reversedData.length; i++) {
                const item = reversedData[i];
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50";
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap">${item['Fecha'] || '-'}</td>
                    <td class="font-bold">${decodeHtml(item['Norma'] || '-')}</td>
                    <td><span class="px-2 py-1 bg-blue-100 rounded text-xs">${item['Pilar del SIG'] || '-'}</span></td>
                    <td class="text-xs">${decodeHtml(item['Sumilla / Descripción'] || '-')}</td>
                    <td class="text-xs">${decodeHtml(item['Autoridad'] || '-')}</td>
                    <td class="text-xs">${item['Tipo de norma'] || '-'}</td>
                    <td>${(item['Enlace'] && item['Enlace'] !== '--') ? `<a href="${item['Enlace']}" target="_blank" class="text-blue-600 underline">Ver</a>` : '-'}</td>
                    <td class="text-xs italic">${decodeHtml(item['Recomendación'] || '-')}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // --- LÓGICA DE KPIs ---
        function renderKPIs(data) {
            let total = data.length;
            let obli = 0;
            let info = 0;
            let refe = 0;
            
            for (let i = 0; i < data.length; i++) {
                const tipo = (data[i]['Tipo de norma'] || '').trim().toUpperCase();
                if (tipo.includes('OBLIGATORIO')) { obli++; }
                else if (tipo.includes('INFORMATIVO')) { info++; }
                else if (tipo.includes('REFERENCIAL')) { refe++; }
            }
            
            document.getElementById('kpi-total').textContent = total;
            document.getElementById('kpi-obli').textContent = obli;
            document.getElementById('kpi-info').textContent = info;
            document.getElementById('kpi-refe').textContent = refe;

            // Fecha de ayer
            const y = new Date();
            y.setDate(y.getDate() - 1);
            const yStr = ('0' + y.getDate()).slice(-2) + '/' + ('0' + (y.getMonth() + 1)).slice(-2) + '/' + y.getFullYear();
            
            const ayer = [];
            for (let i = 0; i < data.length; i++) {
                if ((data[i]['Fecha'] || '').trim() === yStr) {
                    ayer.push(data[i]);
                }
            }
            
            const aCounts = {};
            for (let i = 0; i < ayer.length; i++) {
                const t = ayer[i]['Tipo de norma'] || 'Sin tipo';
                aCounts[t] = (aCounts[t] || 0) + 1;
            }
            
            let detalle = '';
            for (const key in aCounts) {
                detalle += key + ': ' + aCounts[key] + '<br>';
            }
            document.getElementById('kpi-ayer-detalle').innerHTML = detalle || 'Ninguna';
        }

        // --- FILTROS ---
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const pilar = document.getElementById('filterPilar').value;
            const tipo = document.getElementById('filterTipo').value;
            
            const filtered = [];
            for (let i = 0; i < rawData.length; i++) {
                const item = rawData[i];
                const matchSearch = (item['Norma'] || '').toLowerCase().includes(search) || (item['Sumilla / Descripción'] || '').toLowerCase().includes(search);
                const matchPilar = !pilar || item['Pilar del SIG'] === pilar;
                const matchTipo = !tipo || item['Tipo de norma'] === tipo;
                
                if (matchSearch && matchPilar && matchTipo) {
                    filtered.push(item);
                }
            }
            renderAll(filtered);
        }

        function resetDashboard() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterPilar').value = '';
            document.getElementById('filterTipo').value = '';
            renderAll(rawData);
        }

        // --- GRÁFICOS ---
        function updateCharts(data) {
            if (charts.chartYears) charts.chartYears.destroy();
            if (charts.chartPillars) charts.chartPillars.destroy();
            if (charts.chartTypes) charts.chartTypes.destroy();
            
            function getCounts(key) {
                const counts = {};
                for (let i = 0; i < data.length; i++) {
                    const val = data[i][key] || 'N/A';
                    counts[val] = (counts[val] || 0) + 1;
                }
                return counts;
            }
            
            const yData = getCounts('year');
            charts.chartYears = new Chart(document.getElementById('chartYears'), {
                type: 'bar', 
                data: { 
                    labels: Object.keys(yData), 
                    datasets: [{ label: 'Normas', data: Object.values(yData), backgroundColor: '#3b82f6' }] 
                },
                options: { plugins: { title: { display: true, text: 'Evolución Anual' } } }
            });
            
            function createDoughnut(canvasId, dataObj, titleText) {
                return new Chart(document.getElementById(canvasId), {
                    type: 'doughnut',
                    data: { 
                        labels: Object.keys(dataObj), 
                        datasets: [{ 
                            data: Object.values(dataObj), 
                            backgroundColor: getColors(Object.keys(dataObj).length) 
                        }] 
                    },
                    options: {
                        plugins: {
                            title: { display: true, text: titleText },
                            datalabels: {
                                formatter: function(value, context) {
                                    const dataSet = context.dataset.data;
                                    let sum = 0;
                                    for (let i = 0; i < dataSet.length; i++) { sum += dataSet[i]; }
                                    const percentage = ((value * 100) / sum).toFixed(1) + "%";
                                    return value + "\n(" + percentage + ")";
                                },
                                color: '#000',
                                font: { weight: 'bold' }
                            }
                        }
                    }
                });
            }

            charts.chartPillars = createDoughnut('chartPillars', getCounts('Pilar del SIG'), 'Distribución por Pilares');
            charts.chartTypes = createDoughnut('chartTypes', getCounts('Tipo de norma'), 'Distribución por Tipos');
        }
    </script>
</body>
</html>
